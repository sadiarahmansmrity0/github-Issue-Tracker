<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>GitHub Issues Trackers</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      * {
            font-family: 'Inter', sans-serif;
        }
            .border-top-green {
            border-top: 4px solid #10b981;
        }
        .border-top-purple {
            border-top: 4px solid #8b5cf6;
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
        }
        .active-tab {
            background-color: #3b82f6;
            color: white;
        }
    </style>
</head>
<body class="">
    <!-- login page -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4 bg-gray-100">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
    <!-- logo and title -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <img src="assets/github-logo.png" 
             alt="GitHub Logo" class="w-16 h-16" />
      </div>
      <h1 class="text-2xl font-bold text-gray-800 mb-2">GitHub Issues Tracker</h1>
      <p class="text-gray-500">Sign in to manage your issues</p>
    </div>
<!-- inputs -->
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
        <input type="text" id="username" placeholder="Enter Username"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition">
        <p class="text-xs text-purple-600 mt-1">Default: admin</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" id="password" placeholder="Enter Password"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition">
        <p class="text-xs text-purple-600 mt-1">Default: admin123</p>
      </div>

      <button onclick="handleLogin()" 
              class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-200">
        Sign In
      </button>

      <div class="flex items-center my-6">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="px-4 text-gray-500 text-sm">OR</span>
        <div class="flex-grow border-t border-gray-300"></div>
      </div>

      <div class="text-center text-sm space-y-1 ">
        <p class="font-medium text-gray-500">Demo Credentials:</p>
        <div class="bg-gray-50 p-4"> 
            <p ><span class="font-bold">Username: </span><span class="font-mono">admin</span></p>
        <p><span class="font-bold">Password: </span><span class="font-mono">admin123</span></p></div>
       
      </div>
    </div>
  </div>
</div>
<!-- mainpage -->
<div id="mainPage" class="hidden min-h-screen bg-gray-50">
  <!-- nav -->
  <nav class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        
   <!-- logo & title -->
        <div class="flex items-center space-x-1">
          <img src="assets/github-logo.png" 
               alt="GitHub Logo" class="w-8 h-8">
          <span class="text-xl font-bold text-gray-800">GitHub Issues Tracker</span>
        </div>
        
        <!-- button -->
        <div class="flex items-center space-x-2">
          <!-- Search Bar -->
          <div class="relative"> 
            <button onclick="handleSearch()"
                    class="absolute left-2 top-2 text-gray-400 hover:text-black">
              <i class="fas fa-search"></i>
            </button>
            <input type="text" id="searchInput" placeholder="Search issues..." 
                   class="w-64 px-4 py-2 pr-16 pl-8 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-700 outline-none">
           
          </div>
          

          <button 
                  class="bg-blue-700 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-800 transition">
            + New Issue
          </button>
        </div>
      </div>
    </div>
    
  </nav>
  <!-- mainContent -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Tabs -->
            <div class="flex space-x-2 mb-6">
                <button onclick="filterIssues('all')" id="tabAll" class="active-tab px-6 py-2 rounded-lg font-medium transition">All</button>
                <button onclick="filterIssues('open')" id="tabOpen" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition">Open</button>
                <button onclick="filterIssues('closed')" id="tabClosed" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition">Closed</button>
            </div>

            <!-- Stats Bar -->
           <div class="bg-white rounded-lg p-4 mb-6 flex flex-wrap items-center justify-between">
  <!-- Left-->
            <div class="flex items-center space-x-3">
            <div class="bg-purple-100 rounded-full p-2">
              <img src="assets/Aperture.png" alt="">
           </div>

           <div class="flex flex-col">
           <div class="flex items-center space-x-2">
               <span class="font-semibold text-gray-700">Total Issues:</span>
                <span id="issueCount" class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm font-medium">0</span>
           </div>
          <p class="font-medium text-gray-500 mt-1">Track and manage your project issues</p>
        </div>
     </div>

  <!-- Right -->
        <div class="flex items-center space-x-4 mt-2 sm:mt-0">
        <div class="flex items-center space-x-2">
       <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            <span class="text-sm text-gray-600">Open</span>
     </div>
    <div class="flex items-center space-x-2">
      <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
      <span class="text-sm text-gray-600">Closed</span>
    </div>
  </div>
 </div>
 
            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="hidden flex justify-center items-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            </div>

            <!-- Issues Grid -->
            <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                
            </div>
        </main>
    </div>

    <!-- Issue Modal -->
    <div id="issueModal" class="hidden fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-gray-800">Issue Details</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <div id="modalContent" class="space-y-4">
                    <!-- Modal content will be dynamically inserted here -->
                </div>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
