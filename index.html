<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>GitHub Issues Trackers</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      * {
            font-family: 'Inter', sans-serif;
        }
            .border-top-green {
            border-top: 4px solid #10b981;
        }
        .border-top-purple {
            border-top: 4px solid #8b5cf6;
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
        }
        .active-tab {
            background-color: #3b82f6;
            color: white;
        }
        @media (max-width: 640px) {
    #issuesGrid {
        grid-template-columns: 1fr !important;
    }
    .active-tab {
        font-size: 0.875rem;
        padding-left: 1rem;
        padding-right: 1rem;
    }
}
img {
    max-width: 100%;
    height: auto;
}
button, 
input[type="text"],
input[type="password"] {
    min-height: 44px;
}
#modalContent {
    max-height: 70vh;
    overflow-y: auto;
    padding-right: 4px;
}
    </style>
</head>
<body class="">
    <!-- login page -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4 bg-gray-100">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
    <!-- logo and title -->
    <div class="text-center mb-8">
      <div class="flex justify-center mb-4">
        <img src="assets/github-logo.png" 
             alt="GitHub Logo" class="w-16 h-16" />
      </div>
      <h1 class="text-2xl font-bold text-gray-800 mb-2">GitHub Issues Tracker</h1>
      <p class="text-gray-500">Sign in to manage your issues</p>
    </div>
<!-- inputs -->
    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
        <input type="text" id="username" placeholder="Enter Username"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition">
        <p class="text-xs text-purple-600 mt-1">Default: admin</p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <input type="password" id="password" placeholder="Enter Password"
               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition">
        <p class="text-xs text-purple-600 mt-1">Default: admin123</p>
      </div>

      <button onclick="handleLogin()" 
              class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition duration-200">
        Sign In
      </button>

      <div class="flex items-center my-6">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="px-4 text-gray-500 text-sm">OR</span>
        <div class="flex-grow border-t border-gray-300"></div>
      </div>

      <div class="text-center text-sm space-y-1 ">
        <p class="font-medium text-gray-500">Demo Credentials:</p>
        <div class="bg-gray-50 p-4"> 
            <p ><span class="font-bold">Username: </span><span class="font-mono">admin</span></p>
        <p><span class="font-bold">Password: </span><span class="font-mono">admin123</span></p></div>
       
      </div>
    </div>
  </div>
</div>
<!-- mainpage -->
<div id="mainPage" class="hidden min-h-screen bg-gray-50">
  <!-- nav -->
  <nav class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col sm:flex-row justify-between items-center h-auto sm:h-16 py-4 sm:py-0 gap-4">
        
   <!-- logo & title -->
        <div class="flex items-center space-x-1 w-full sm:w-auto justify-center sm:justify-start">
          <img src="assets/github-logo.png" 
               alt="GitHub Logo" class="w-8 h-8">
          <span class="text-xl font-bold text-gray-800">GitHub Issues Tracker</span>
        </div>
        
        <!-- button -->
        <div class="flex flex-col sm:flex-row items-center space-y-2 sm:space-y-0 sm:space-x-2 w-full sm:w-auto">
          <!-- Search Bar -->
          <div class="relative w-full sm:w-auto"> 
            <button onclick="handleSearch()"
                    class="absolute left-2 top-2 text-gray-400 hover:text-black">
              <i class="fas fa-search"></i>
            </button>
            <input type="text" id="searchInput" placeholder="Search issues..." 
                   class="w-full sm:w-64 px-4 py-2 pr-16 pl-8 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-700 outline-none">
           
          </div>
          

          <button 
                  class="bg-blue-700 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-800 transition w-full sm:w-auto">
            + New Issue
          </button>
        </div>
      </div>
    </div>
    
  </nav>
  <!-- mainContent -->
        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Tabs -->
            <div class="flex flex-wrap gap-2 mb-6">
                <button onclick="filterIssues('all')" id="tabAll" class="active-tab px-4 sm:px-6 py-2 rounded-lg font-medium transition text-sm sm:text-base flex-1 sm:flex-none">All</button>
                <button onclick="filterIssues('open')" id="tabOpen" class="px-4 sm:px-6 sm:px-6 py-2 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition text-sm sm:text-base flex-1 sm:flex-none">Open</button>
                <button onclick="filterIssues('closed')" id="tabClosed" class="px-4 sm:px-6 py-2 bg-gray-200 text-gray-700 rounded-lg font-medium hover:bg-gray-300 transition text-sm sm:text-base flex-1 sm:flex-none">Closed</button>
            </div>

            <!-- Stats Bar -->
           <div class="bg-white rounded-lg p-4 mb-6 flex flex-wrap items-center justify-between">
  <!-- Left-->
           <div class="bg-white rounded-xl p-4 sm:p-6 mb-8 flex flex-col sm:flex-row flex-wrap items-center justify-between shadow-sm border border-gray-100 gap-4">
    <div class="flex items-center gap-4 w-full sm:w-auto">
        <div class="bg-purple-50 rounded-full p-3">
            <img src="assets/Aperture.png" alt="Icon" class="w-6 h-6">
        </div>
        <div>
            <div class="flex items-baseline gap-2">
                <span id="issueCount" class="text-2xl font-bold text-gray-900">0</span>
                <span class="text-2xl font-bold text-gray-900">Issues</span>
            </div>
            <p class="text-gray-500 text-sm font-medium">Track and manage your project issues</p>
        </div>
    </div>

    <div class="flex items-center gap-6 w-full sm:w-auto justify-center sm:justify-end">
        <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full"></div>
            <span class="text-sm font-semibold text-gray-600">Open</span>
        </div>
        <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 bg-purple-500 rounded-full"></div>
            <span class="text-sm font-semibold text-gray-600">Closed</span>
        </div>
    </div>
</div>
 
            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="hidden flex justify-center items-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            </div>

            <!-- Issues Grid -->
            <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                
            </div>
        </main>
    </div>

    <!-- Issue Modal -->
   <div id="issueModal" class="fixed inset-0 bg-black/40 flex items-center justify-center hidden z-50 p-4">
  <div class="bg-white rounded-xl w-full max-w-[90%] sm:max-w-lg md:max-w-[500px] p-4 sm:p-6 shadow-lg max-h-[90vh] overflow-y-auto">
    <div id="modalContent"></div>
    <div class="flex justify-end mt-4 sm:mt-6">
      <button onclick="closeModal()" class="bg-purple-600 text-white px-4 sm:px-6 py-2 rounded-md hover:bg-purple-700 text-sm sm:text-base w-full sm:w-auto">
        Close
      </button>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
